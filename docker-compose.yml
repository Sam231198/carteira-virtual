version: '3.9'

services:
  mysql:
    image: mysql:8.1
    container_name: carteira_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: carteira_virtual
      MYSQL_TCP_PORT: 3306
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    container_name: carteira_backend
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: carteira_virtual
      DB_USERNAME: root
      DB_PASSWORD: root
    volumes:
      - ./back-end:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - backend_node_modules:/var/www/html/node_modules
    working_dir: /var/www/html
    command: ["php","artisan","serve","--host=0.0.0.0","--port=8000"]

  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    container_name: carteira_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_HOST: 0.0.0.0
      VITE_PORT: 5173
    volumes:
      - ./front-end:/app
      - frontend_node_modules:/app/node_modules
    working_dir: /app
    command: ["npm","run","dev","--","--host","0.0.0.0","--port","5173"]

volumes:
  mysql_data:
  backend_vendor:
  backend_node_modules:
  frontend_node_modules:
